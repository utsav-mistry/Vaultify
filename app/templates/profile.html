<!-- profile.html -->
{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Hello, {{ current_user.username }}!</h2>
    <h3>Activity Logs</h3>

    <!-- Logs Table Section -->
    <div class="card mt-3">
        <div class="card-body">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Action</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <td>{{log.timestamp}}</td>
                        <td>{{ log.action }}</td>
                        <td>{{log.details}}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3">No logs available.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
<!-- Delete Profile Button -->
<div class="mt-4">
    <a href="{{ url_for('delete_profile') }}" class="btn btn-danger btn-sm">
        <i class="fas fa-user-slash"></i> Delete My Profile
    </a>
</div>
{% endblock %}
